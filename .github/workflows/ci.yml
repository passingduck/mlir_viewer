name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npx vitest run
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      # The Playwright webServer builds the fixture trace and serves it with
      # the real Rust server, so this exercises the full stack end to end.
      - run: npx playwright test

  # The C++ capture library (capture/) needs an MLIR 21 toolchain that is far
  # too heavy to build per-run here; its cmake/ctest suite and the
  # cross-language conformance test (MLIR_TRACE_CPP_FIXTURE) run locally.
  # See README.md#c-capture-library.
